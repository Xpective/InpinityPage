<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>INPINITY – Reveal Test</title>
    <style>
        body { font-family: monospace; background: #111; color: #0f0; padding: 20px; }
        pre { background: #222; padding: 10px; border-radius: 5px; overflow: auto; }
        button { padding: 10px 20px; background: #0a0; color: white; border: none; cursor: pointer; }
    </style>
</head>
<body>
    <h2>INPINITY Reveal Test (Block 0)</h2>
    <button id="connect">Connect Wallet</button>
    <button id="reveal">Reveal Block 0</button>
    <pre id="log"></pre>

    <script src="https://cdn.jsdelivr.net/npm/ethers@5.7.2/dist/ethers.umd.min.js"></script>
    <script>
        const NFT_ADDRESS = "0x35263645aD3C1e4351a5b234C683BAF243b9854F";
        const WORKER_URL = "https://inpinity-worker-final.s-plat.workers.dev";
        let provider, signer, nftContract;

        async function connect() {
            if (!window.ethereum) return alert('MetaMask?');
            provider = new ethers.providers.Web3Provider(window.ethereum);
            await provider.send("eth_requestAccounts", []);
            signer = provider.getSigner();
            const network = await provider.getNetwork();
            if (network.chainId !== 8453) {
                await window.ethereum.request({ method: 'wallet_switchEthereumChain', params: [{ chainId: '0x2105' }] });
            }
            nftContract = new ethers.Contract(NFT_ADDRESS, ["function revealBlock(uint256,bytes32[],bytes32[],uint8,uint8) external"], signer);
            log("Wallet connected");
        }

        async function testReveal() {
            try {
                const response = await fetch(`${WORKER_URL}/api/get-proof?row=0&col=0`);
                const proofs = await response.json();
                log("Proofs loaded: " + JSON.stringify(proofs, null, 2));

                const format = (arr) => arr.map(p => (p.left ? p.left : p.right).startsWith('0x') ? (p.left ? p.left : p.right) : '0x' + (p.left ? p.left : p.right));
                const piProof = format(proofs.pi.proof);
                const phiProof = format(proofs.phi.proof);

                // Leaf-Berechnung mit ethers
                const computedPiLeaf = ethers.utils.keccak256(
                    ethers.utils.solidityPack(['uint256', 'uint256', 'uint8'], [0, 0, proofs.pi.digit])
                );
                const providedPiLeaf = proofs.pi.leaf.startsWith('0x') ? proofs.pi.leaf : '0x' + proofs.pi.leaf;
                log(`Computed Pi leaf: ${computedPiLeaf}`);
                log(`Provided Pi leaf: ${providedPiLeaf}`);

                if (computedPiLeaf !== providedPiLeaf) {
                    log("❌ Leaf mismatch! Aborting.");
                    return;
                }

                log("✅ Leaves match, sending transaction...");
                const tx = await nftContract.revealBlock(0, piProof, phiProof, proofs.pi.digit, proofs.phi.digit, { gasLimit: 300000 });
                log("Transaction sent: " + tx.hash);
                await tx.wait();
                log("✅ Reveal successful!");
            } catch (e) {
                log("❌ Error: " + e.message);
            }
        }

        function log(msg) {
            document.getElementById('log').innerText += msg + '\n';
        }

        document.getElementById('connect').addEventListener('click', connect);
        document.getElementById('reveal').addEventListener('click', testReveal);
    </script>
</body>
</html>
